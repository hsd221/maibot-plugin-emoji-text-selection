[plugin]
enabled = true
config_version = "1.3.0"

[selector]
max_emotion_tags = 50
max_selected_tags = 5
llm_model = "emoji"
filter_send_emoji = true
tool_discovery = "始终发现"
llm_temperature = 0.7
llm_max_tokens = 64
context_message_limit = 30

[semantic]
enabled = false
refresh_interval_seconds = 300
similarity_threshold = 0.3
embed_batch_size = 64
fetch_concurrency = 10
